name: Auto Publish Blog Post

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:
    inputs:
      topic_slug:
        description: 'Optional topic slug to generate (leave blank to use next from queue)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install ts-node and types
        run: npm install -g ts-node typescript @types/node

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.topic_slug }}" ]; then
            ts-node --project scripts/tsconfig.json scripts/generate-post.ts "${{ github.event.inputs.topic_slug }}"
          else
            ts-node --project scripts/tsconfig.json scripts/generate-post.ts
          fi

      - name: Commit and push new post
        run: |
          git config user.name "cloudcwfranck"
          git config user.email "yakengne@gmail.com"
          git add src/app/\[locale\]/blog/posts/en/ scripts/topic-queue.json
          if git diff --staged --quiet; then
            echo "No new post generated."
            exit 0
          fi
          SLUG=$(git diff --staged --name-only | grep '\.mdx$' | head -1 | xargs basename -s .mdx)
          git commit -m "feat(blog): publish ${SLUG}"
          git push origin main
